<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html,body{
width:100%;
background:#0b1320;
color:#fff;

/* keep scrolling but hide scrollbar */
overflow-x:hidden;
overflow-y:scroll;
scroll-behavior:smooth;
}

/* HIDE SCROLLBAR COMPLETELY */

/* Chrome, Edge, Safari */
body::-webkit-scrollbar{
width:0px;
background:transparent;
}

/* Firefox */
html{
scrollbar-width:none;
}

/* IE / old Edge */
body{
-ms-overflow-style:none;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:12px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#0b1320;
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:1000;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-circle{
width:60px;
height:60px;
border-radius:50%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.logo-circle img{
width:85%;
}

.logo-text h2{font-size:16px;}
.logo-text p{font-size:10px;color:#ccc;}

nav{
display:flex;
gap:25px;
}

nav a{
color:#fff;
text-decoration:none;
font-size:16px;
transition:0.3s;
}

nav a:hover{
color:#ff7b00;
}

/* HERO */
.hero{
min-height:55vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:120px 8% 40px;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url('https://images.unsplash.com/photo-1581092160562-40aa08e78837') center/cover no-repeat;
}

.hero h1{
font-size:50px;
}

.hero span{
color:#ff7b00;
}

.hero p{
margin-top:12px;
color:#ddd;
font-size:18px;
}

/* CONTACT */
.contact{
padding:70px 8%;
display:flex;
justify-content:center;
}

.contact-card{
max-width:700px;
width:100%;
background:rgba(255,255,255,0.05);
padding:35px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
transition:0.3s;
}

.contact-card:hover{
transform:translateY(-5px);
}

.contact-card h3{
font-size:28px;
color:#ff7b00;
margin-bottom:20px;
}

.info-item{
display:flex;
align-items:center;
gap:15px;
padding:15px;
margin:12px 0;
border-radius:12px;
background:rgba(255,255,255,0.04);
transition:0.3s;
}

.info-item:hover{
background:rgba(255,123,0,0.1);
transform:translateX(5px);
}

.info-item i{
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,123,0,0.15);
color:#ff7b00;
border-radius:10px;
font-size:18px;
}

.info-text h4{
font-size:15px;
margin:0;
}

.info-text span{
font-size:13px;
color:#ccc;
}

/* FLOATING BUTTONS */
.floating{
position:fixed;
right:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.floating a{
width:55px;
height:55px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
font-size:22px;
text-decoration:none;
transition:0.3s;
}

.floating a:hover{
transform:scale(1.1);
}

.phone{background:#ff7b00;}
.email{background:#1e90ff;}
.whatsapp{background:#25d366;}

/* RESPONSIVE */
@media(max-width:768px){

nav{
justify-content:center;
gap:15px;
}

.hero h1{
font-size:35px;
}
}

</style>
</head>
